{% load static %}
<!-- SEO Meta Tags -->
<meta name="description" content="{{ post.title }}{% if post.description %}: {{ post.description|striptags|truncatechars:150 }}{% else %} - Tin tức từ PTcom.{% endif %}">
<meta name="keywords" content="{% if post.subject %}{{ post.subject.title }}, {% endif %}{% if post.subsubject %}{{ post.subsubject.title }}, {% endif %}{{ post.title }}, PTcom, tin tức công nghệ">
<meta name="author" content="PTcom">
<meta name="robots" content="index, follow">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="article">
<meta property="og:title" content="{{ post.title }} | PTcom">
<meta property="og:description" content="{{ post.description|striptags|truncatechars:160 }}">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:site_name" content="PTcom">
<meta property="og:locale" content="vi_VN">
{% if post.thumbnail %}
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{{ post.get_thumbnail }}">
{% endif %}

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ post.title }} | PTcom">
<meta name="twitter:description" content="{{ post.description|striptags|truncatechars:160 }}">
{% if post.thumbnail %}
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{{ post.get_thumbnail }}">
{% endif %}

<!-- Article Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ post.title|escapejs }}",
  "description": "{{ post.description|striptags|truncatechars:160|escapejs }}",
  "image": "{% if post.thumbnail %}{{ request.scheme }}://{{ request.get_host }}{{ post.get_thumbnail }}{% endif %}",
  "author": {
    "@type": "Organization",
    "name": "PTcom"
  },
  "publisher": {
    "@type": "Organization",
    "name": "PTcom"
  },
  "datePublished": "{{ post.created_at|date:'c' }}",
  "dateModified": "{{ post.updated_at|date:'c' }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ request.build_absolute_uri }}"
  }
}
</script>
