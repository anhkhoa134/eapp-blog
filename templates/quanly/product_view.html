{% extends 'quanly/quanly.html' %}
{% load static %}
{% load custom_tags %}
{% block title %}Sản phẩm{% endblock title %}

{% block content %}

<main id="main" class="main">
    <div class="pagetitle">
        <h1>Sản Phẩm</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'quanly:dashboard' %}">Quản lý</a></li> 
                <li class="breadcrumb-item active">Sản phẩm</li>
            </ol>
        </nav>
    </div>
    <!-- End Page Title -->

    <section class="section dashboard">
        <div class="row">

            <!-- Product -->
            <div class="col-12 mb-3"  
                hx-trigger="load, listChange from:body"
                hx-get="{% url 'quanly:product_list' %}"
                hx-target="this">
            </div>

        </div>
    </section>
</main>
<!-- End #main -->

{% endblock content %}
