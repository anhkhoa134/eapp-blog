<form class="modal-content" hx-post="{{ request.path }}" hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'>
    <div class="modal-header">
        <h5 class="modal-title">Gửi Email Marketing</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <div class="mb-3">
            <label for="subject" class="form-label">Tiêu đề</label>
            <input type="text" class="form-control" id="subject" name="subject" placeholder="Khuyến mãi từ PTcom">
        </div>
        <div class="mb-3">
            <label for="recipients" class="form-label">Danh sách email nhận (phân tách bằng dấu phẩy)</label>
            <input type="text" class="form-control" id="recipients" name="recipients" placeholder="email1@example.com, email2@example.com">
        </div>
        <div class="mb-3">
            <label for="message" class="form-label">Nội dung</label>
            <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button type="submit" class="btn btn-primary">Gửi</button>
    </div>
</form>
