<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
        {% if page_obj.has_previous %}
        <li class="page-item">
            <a class="page-link" style="cursor: pointer;"
                hx-get="{{ URL_name }}?page={{ page_obj.previous_page_number }}&{{ filtered_query_params }}"
                hx-target="{{target_container_id}}"
                hx-swap="outerHTML"
                aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
            </a>
        </li>
        {% else %}
        <li class="page-item disabled">
            <span class="page-link" aria-hidden="true">&laquo;</span>
        </li>
        {% endif %}

        <!-- Page Numbers -->
        {% for i in elided_page_range %}
            {% if i == page_obj.paginator.ELLIPSIS %}
            <li class="page-item disabled">
                <span class="page-link">{{ i }}</span>
            </li>
            {% else %}
            <li class="page-item {% if page_obj.number == i %}active{% endif %}">
                <a class="page-link" style="cursor: pointer;"
                    hx-get="{{ URL_name }}?page={{ i }}&{{ filtered_query_params }}"
                    hx-target="{{target_container_id}}"
                    hx-swap="outerHTML">{{ i }}</a>
            </li>
            {% endif %}
        {% endfor %}

        {% if page_obj.has_next %}
        <li class="page-item">
            <a class="page-link" style="cursor: pointer;"
                hx-get="{{ URL_name }}?page={{ page_obj.next_page_number }}&{{ filtered_query_params }}"
                hx-target="{{target_container_id}}"
                hx-swap="outerHTML"
                aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
            </a>
        </li>
        {% else %}
        <li class="page-item disabled">
            <span class="page-link" aria-hidden="true">&raquo;</span>
        </li>
        {% endif %}
    </ul>
</nav>
